[project]
name = "ctms-app"

[[services]]
name = "ctms-backend"
source = "."
builder = "NIXPACKS"

[services.variables]
JAVA_OPTS = "-Xmx512m"

[deploy]
healthcheckPath = "/api/clients"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# Database service (already exists)
[[services.database]]
name = "ctms-postgres"
